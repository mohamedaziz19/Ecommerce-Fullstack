<section
  class="signin sec-form"
  *ngIf="showForm"
  (click)="onBackgroundClick($event)"
>
  <div class="form-container">
    <p class="title">Sign Up</p>

 
    <form (ngSubmit)="signup(signupForm)" #signupForm="ngForm" class="form">
    
      <!-- Error message -->
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>


      <div class="form-group">
        <input
          type="text"
          placeholder="Username"
          name="name"
          ngModel
          required
          #username="ngModel"
        />
        <div class="msg" *ngIf="username.invalid && username.touched">
          <span *ngIf="username.errors?.['required']"
            >*Username is required*</span
          >
        </div>
      </div>


      <div class="form-group">
        <input
          type="email"
          placeholder="Email"
          name="email"
          ngModel
          required
          #email="ngModel"
        />
        <div class="msg" *ngIf="email.invalid && email.touched">
          <span *ngIf="email.errors?.['required']">*Email is required*</span>
          <span *ngIf="email.errors?.['email']">*Invalid email*</span>
        </div>
      </div>


      <div class="form-group">
        <input
          type="password"
          placeholder="Password"
          name="password"
          ngModel
          required
          #password="ngModel"
        />
        <div class="msg" *ngIf="password.invalid && password.touched">
          <span *ngIf="password.errors?.['required']"
            >*Password is required*</span
          >
        </div>
      </div>


      <div class="form-group">
        <input
          type="password"
          placeholder="Re-enter the password"
          name="ReEnterPassword"
          ngModel
          required
          [pattern]="password.value"
          #ReEnterPassword="ngModel"
        />
        <div
          class="msg"
          *ngIf="ReEnterPassword.invalid && ReEnterPassword.touched"
        >
          <span *ngIf="ReEnterPassword.errors?.['required']"
            >*Re-enter the password is required*</span
          >
          <span *ngIf="ReEnterPassword.errors?.['pattern']"
            >*It must be the same as password*</span
          >
        </div>
      </div>


      <input type="submit" class="form-btn" [disabled]="signupForm.invalid" value="Sign Up" />
    </form>



    <!-- Link to Login Page -->
    <p class="log-up-label">
      Have an Account?
      <a routerLink="/login" class="log-in-link">Log In</a>
    </p>

    <!-- Social Media Login Options -->
    <div class="btns-container">
      <div class="apple-login-btn">
        <i class="fa-brands fa-apple"></i>
        <span>Sign Up With Apple</span>
      </div>

      <div class="google-login-btn">
        <i class="fa-brands fa-google"></i>
        <span>Sign Up With Google</span>
      </div>
    </div>
  </div>
</section>
